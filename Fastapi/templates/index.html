<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --accent-primary: #06ffa5;
            --accent-secondary: #00d9ff;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #2d3748;
            --error: #ff4757;
            --success: #06ffa5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(6, 255, 165, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 10%, rgba(6, 255, 165, 0.05) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .controls {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease 0.2s backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            box-shadow: 0 4px 20px rgba(6, 255, 165, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(6, 255, 165, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(6, 255, 165, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 1s ease 0.4s backwards;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .product-card:hover::before {
            transform: scaleX(1);
        }

        .product-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(6, 255, 165, 0.15);
        }

        .product-image-container {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1a2332 0%, #0f1621 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-image-icon {
            font-size: 5rem;
            filter: drop-shadow(0 4px 12px rgba(6, 255, 165, 0.3));
        }

        .product-image-placeholder {
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .product-image-placeholder svg {
            width: 60px;
            height: 60px;
            opacity: 0.3;
        }

        .product-content {
            padding: 1.8rem;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .product-id {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
            background: rgba(6, 255, 165, 0.1);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
        }

        .product-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .product-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .product-details {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .detail-item {
            flex: 1;
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .detail-value.price {
            color: var(--accent-primary);
        }

        .product-actions {
            display: flex;
            gap: 0.8rem;
        }

        .btn-icon {
            padding: 0.6rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-icon:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .btn-delete {
            border-color: var(--error);
            color: var(--error);
        }

        .btn-delete:hover {
            background: var(--error);
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeInModal 0.3s ease;
        }

        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            margin-bottom: 2rem;
        }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(6, 255, 165, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group select {
            cursor: pointer;
        }

        /* Icon Preview */
        .icon-preview-container {
            margin-bottom: 1.5rem;
        }

        .icon-preview {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1a2332 0%, #0f1621 100%);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-top: 0.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-color: var(--success);
        }

        .notification.error {
            border-color: var(--error);
        }

        /* Confirm Dialog */
        .confirm-dialog {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1500;
            align-items: center;
            justify-content: center;
            animation: fadeInModal 0.3s ease;
        }

        .confirm-dialog.active {
            display: flex;
        }

        .confirm-content {
            background: var(--bg-card);
            border: 1px solid var(--error);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 40px rgba(255, 71, 87, 0.2);
        }

        .confirm-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 50%;
        }

        .confirm-icon svg {
            width: 32px;
            height: 32px;
            color: var(--error);
        }

        .confirm-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 0.8rem;
        }

        .confirm-message {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-confirm {
            flex: 1;
            background: var(--error);
            color: white;
            border: none;
        }

        .btn-confirm:hover {
            background: #ff3747;
            box-shadow: 0 6px 30px rgba(255, 71, 87, 0.4);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Product Manager</h1>
            <p class="subtitle">Manage your inventory with style</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>
            <button class="btn btn-primary" onclick="openCreateModal()">
                + Add Product
            </button>
            <button class="btn btn-secondary" onclick="loadProducts()">
                ↻ Refresh
            </button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add Product</h2>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <!-- Icon Selection -->
                <div class="icon-preview-container">
                    <label>Product Icon</label>
                    <div class="icon-preview" id="iconPreview">📚</div>
                    <select id="productIcon" onchange="updateIconPreview()">
                        <option value="📚">📚 Book</option>
                        <option value="🖱️">🖱️ Mouse</option>
                        <option value="⌨️">⌨️ Keyboard</option>
                        <option value="🎧">🎧 Headphones</option>
                        <option value="💾">💾 USB Drive</option>
                        <option value="🖥️">🖥️ Monitor</option>
                        <option value="🖨️">🖨️ Printer</option>
                        <option value="📹">📹 Webcam</option>
                        <option value="🔊">🔊 Speakers</option>
                        <option value="💿">💿 External HDD</option>
                        <option value="🔋">🔋 Power Bank</option>
                        <option value="📡">📡 Router</option>
                        <option value="⌚">⌚ Smartwatch</option>
                        <option value="📱">📱 Tablet</option>
                        <option value="📲">📲 Mobile Phone</option>
                        <option value="🔌">🔌 Charger</option>
                        <option value="🎵">🎵 Earbuds</option>
                        <option value="💽">💽 SSD</option>
                        <option value="🎮">🎮 Graphics Card</option>
                        <option value="⚡">⚡ UPS</option>
                        <option value="💻">💻 Laptop</option>
                        <option value="🖊️">🖊️Pen</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price ($)</label>
                    <input type="number" id="productPrice" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="productQuantity">Quantity</label>
                    <input type="number" id="productQuantity" min="0" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary" style="flex: 1">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-content">
            <div class="confirm-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <h3 class="confirm-title">Delete Product?</h3>
            <p class="confirm-message" id="confirmMessage">Are you sure you want to delete this product? This action cannot be undone.</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
                <button class="btn btn-confirm" id="confirmButton">Delete</button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let products = [];
        let isEditMode = false;

        // Sample products with icons
        const sampleProducts = [
            { id: 1, name: "Book", icon: "📚", description: "Educational reading material", price: 29.99, quantity: 50 },
            { id: 2, name: "Mouse", icon: "🖱️", description: "Wireless optical mouse", price: 24.99, quantity: 100 },
            { id: 3, name: "Keyboard", icon: "⌨️", description: "Mechanical gaming keyboard", price: 79.99, quantity: 45 },
            { id: 4, name: "Headphones", icon: "🎧", description: "Noise-canceling headphones", price: 149.99, quantity: 30 },
            { id: 5, name: "USB Drive", icon: "💾", description: "64GB USB 3.0 flash drive", price: 15.99, quantity: 200 },
            { id: 6, name: "Monitor", icon: "🖥️", description: "27-inch 4K display", price: 399.99, quantity: 25 },
            { id: 7, name: "Printer", icon: "🖨️", description: "All-in-one inkjet printer", price: 199.99, quantity: 15 },
            { id: 8, name: "Webcam", icon: "📹", description: "1080p HD webcam", price: 59.99, quantity: 40 },
            { id: 9, name: "Speakers", icon: "🔊", description: "Bluetooth stereo speakers", price: 89.99, quantity: 35 },
            { id: 10, name: "External HDD", icon: "💿", description: "2TB external hard drive", price: 79.99, quantity: 60 },
            { id: 11, name: "Power Bank", icon: "🔋", description: "20000mAh portable charger", price: 34.99, quantity: 80 },
            { id: 12, name: "Router", icon: "📡", description: "Dual-band WiFi router", price: 69.99, quantity: 50 },
            { id: 13, name: "Smartwatch", icon: "⌚", description: "Fitness tracking smartwatch", price: 249.99, quantity: 40 },
            { id: 14, name: "Tablet", icon: "📱", description: "10-inch Android tablet", price: 299.99, quantity: 35 },
            { id: 15, name: "Mobile Phone", icon: "📲", description: "Latest smartphone model", price: 799.99, quantity: 20 },
            { id: 16, name: "Charger", icon: "🔌", description: "Fast charging USB-C adapter", price: 19.99, quantity: 150 },
            { id: 17, name: "Earbuds", icon: "🎵", description: "True wireless earbuds", price: 89.99, quantity: 75 },
            { id: 18, name: "SSD", icon: "💽", description: "1TB NVMe SSD", price: 129.99, quantity: 55 },
            { id: 19, name: "Graphics Card", icon: "🎮", description: "High-performance GPU", price: 599.99, quantity: 10 },
            { id: 20, name: "UPS", icon: "⚡", description: "Uninterruptible power supply", price: 149.99, quantity: 25 },
            { id: 21, name: "Laptop", icon: "💻", description: "15-inch business laptop", price: 899.99, quantity: 18 }
        ];

        // Load products on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Try to load from API first, if fails use sample data
            loadProducts().catch(() => {
                products = sampleProducts;
                renderProducts(products);
            });
            setupSearch();
        });

        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/products/`);
                if (!response.ok) throw new Error('API not available');
                products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.log('Using sample data');
                products = sampleProducts;
                renderProducts(products);
            }
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('productsGrid');
            
            if (productsToRender.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                        </svg>
                        <h3>No products found</h3>
                        <p>Add your first product to get started</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = productsToRender.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <div class="product-image-icon">${product.icon || '📦'}</div>
                    </div>
                    <div class="product-content">
                        <div class="product-header">
                            <div class="product-id">#${product.id}</div>
                        </div>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-description">${product.description}</p>
                        <div class="product-details">
                            <div class="detail-item">
                                <div class="detail-label">Price</div>
                                <div class="detail-value price">$${product.price.toFixed(2)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Stock</div>
                                <div class="detail-value">${product.quantity}</div>
                            </div>
                        </div>
                        <div class="product-actions">
                            <button class="btn-icon" onclick="openEditModal(${product.id})">Edit</button>
                            <button class="btn-icon btn-delete" onclick="deleteProduct(${product.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = products.filter(product => 
                    product.name.toLowerCase().includes(query) ||
                    product.description.toLowerCase().includes(query)
                );
                renderProducts(filtered);
            });
        }

        function updateIconPreview() {
            const icon = document.getElementById('productIcon').value;
            document.getElementById('iconPreview').textContent = icon;
        }

        function openCreateModal() {
            isEditMode = false;
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            updateIconPreview();
            document.getElementById('productModal').classList.add('active');
        }

        function openEditModal(id) {
            isEditMode = true;
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productQuantity').value = product.quantity;
            document.getElementById('productIcon').value = product.icon || '📦';
            updateIconPreview();
            
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const productData = {
                id: parseInt(document.getElementById('productId').value) || products.length + 1,
                name: document.getElementById('productName').value,
                description: document.getElementById('productDescription').value,
                price: parseFloat(document.getElementById('productPrice').value),
                quantity: parseInt(document.getElementById('productQuantity').value),
                icon: document.getElementById('productIcon').value
            };

            try {
                if (isEditMode) {
                    // Try API first, if fails update locally
                    try {
                        await fetch(`${API_BASE}/products/${productData.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(productData)
                        });
                    } catch {
                        const index = products.findIndex(p => p.id === productData.id);
                        if (index !== -1) products[index] = productData;
                    }
                    showNotification('Product updated successfully', 'success');
                } else {
                    // Try API first, if fails add locally
                    try {
                        await fetch(`${API_BASE}/products/`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(productData)
                        });
                    } catch {
                        products.push(productData);
                    }
                    showNotification('Product created successfully', 'success');
                }

                closeModal();
                loadProducts();
            } catch (error) {
                showNotification('Operation completed locally', 'success');
                closeModal();
                renderProducts(products);
            }
        });

        async function deleteProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('confirmMessage').textContent = 
                `Are you sure you want to delete "${product.name}"? This action cannot be undone.`;
            
            document.getElementById('confirmDialog').classList.add('active');
            
            document.getElementById('confirmButton').onclick = async () => {
                closeConfirm();
                
                try {
                    try {
                        await fetch(`${API_BASE}/products/${id}`, {
                            method: 'DELETE'
                        });
                    } catch {
                        products = products.filter(p => p.id !== id);
                    }
                    showNotification('Product deleted successfully', 'success');
                    loadProducts();
                } catch (error) {
                    showNotification('Product deleted', 'success');
                    renderProducts(products);
                }
            };
        }

        function closeConfirm() {
            document.getElementById('confirmDialog').classList.remove('active');
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Close modal when clicking outside
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') {
                closeModal();
            }
        });

        // Close confirm dialog when clicking outside
        document.getElementById('confirmDialog').addEventListener('click', (e) => {
            if (e.target.id === 'confirmDialog') {
                closeConfirm();
            }
        });
    </script>
</body>
</html>
